id: farmer-com-cn
name: 农民日报
access:
  url: https://www.farmer.com.cn/
  needsBrowser: true
  waitFor: 3000
extraction:
  listSelector: "ul li"
  filter: 包含即时新闻、时政头条、三农头条、热点推荐板块的li
  fields:
    title:
      selector: "a"
      extract: text
    url:
      selector: "a"
      attribute: href
    publishedAt:
      extract: url
      regex: "\\d{4}/\\d{2}/\\d{2}"
pagination:
  maxPages: 3
