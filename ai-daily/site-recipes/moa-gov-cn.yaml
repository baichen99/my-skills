id: moa-gov-cn
name: 农业农村部官网
access:
  url: http://www.moa.gov.cn/xw/
  needsBrowser: true
  waitFor: 3000
extraction:
  listSelector: ".news_pic_title li, .zwdt ul li"
  fields:
    title:
      selector: "a"
      attribute: title
      fallback:
        selector: "a"
        extract: text
    url:
      selector: "a"
      attribute: href
    publishedAt:
      extract: text
      regex: "\\d{2}-\\d{2}"
pagination:
  maxPages: 3
