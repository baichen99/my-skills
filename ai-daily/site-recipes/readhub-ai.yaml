id: readhub-ai
name: Readhub AI新闻
description: Readhub AI相关新闻列表

access:
  url: https://readhub.cn/news/ai
  needsBrowser: true

  waitFor:
    selector: '.style-module-scss-module__4yj-HW__title'
    timeout: 10000

  scroll:
    enabled: true
    times: 2
    waitAfter: 2000

extraction:
  listSelector: '.mt-3 > div > div'

  fields:
    title:
      selector: '.style-module-scss-module__4yj-HW__title'
      type: text

    url:
      selector: '.style-module-scss-module__4yj-HW__title'
      type: attribute
      attribute: href

    description:
      selector: '.style-module-scss-module__4yj-HW__summary span'
      type: text

    publishedAt:
      selector: '.style-module-scss-module__4yj-HW__meta div:last-child'
      type: text

notes: |
  - 页面使用动态加载，需要滚动获取更多内容
  - 发布时间是相对时间（如"刚刚"、"1小时前"）
  - 新闻链接直接跳转到原文来源网站
