id: github-trending-js
name: GitHub Trending JavaScript
access:
  url: https://github.com/trending/javascript?since=daily
  needsBrowser: true
  waitFor: .Box-row
extraction:
  listSelector: .Box-row
  fields:
    title: h1 a::text
    url: h1 a::attr(href)
    description: p::text
    stars: .mt-2 a:nth-child(1)::text
    forks: .mt-2 a:nth-child(2)::text
    source: GitHub
