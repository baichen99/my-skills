id: jiqizhixin
name: 机器之心
description: 机器之心的AI新闻和技术文章

access:
  url: https://www.jiqizhixin.com/
  needsBrowser: true

  waitFor:
    selector: '.article-item'
    timeout: 10000

extraction:
  listSelector: '.article-item'

  fields:
    title:
      selector: '.article-item-title'
      type: text

    url:
      selector: '.article-item-title'
      type: attribute
      attribute: href

    description:
      selector: '.article-item-summary'
      type: text

    publishedAt:
      selector: '.article-item-time'
      type: text
      optional: true

    source:
      selector: '.article-item-source'
      type: text
      optional: true

notes: |
  - 机器之心是中国知名的AI技术社区和媒体
  - 内容覆盖AI研究、技术和应用
  - 需要浏览器渲染，页面内容动态加载
