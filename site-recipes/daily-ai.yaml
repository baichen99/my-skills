id: daily-ai
name: Daily AI
description: Daily AI的每日AI新闻

access:
  url: https://daily.ai/
  needsBrowser: false

extraction:
  listSelector: '.post'

  fields:
    title:
      selector: '.post-title a'
      type: text

    url:
      selector: '.post-title a'
      type: attribute
      attribute: href

    description:
      selector: '.post-excerpt'
      type: text

    publishedAt:
      selector: '.post-date'
      type: text
      optional: true

    source:
      selector: '.post-author'
      type: text
      optional: true

notes: |
  - Daily AI是一个专注于AI领域的新闻网站
  - 每日更新，包含AI研究和行业动态
  - 页面结构简洁，适合自动化抓取
