id: mittechreview-ai
name: MIT Technology Review AI
description: MIT Technology Review的AI相关新闻和研究

access:
  url: https://www.technologyreview.com/ai/
  needsBrowser: false

extraction:
  listSelector: '.river-item'

  fields:
    title:
      selector: '.river-item__title a'
      type: text

    url:
      selector: '.river-item__title a'
      type: attribute
      attribute: href

    description:
      selector: '.river-item__excerpt'
      type: text

    publishedAt:
      selector: '.river-item__date'
      type: text
      optional: true

    source:
      selector: '.river-item__byline'
      type: text
      optional: true

notes: |
  - MIT Technology Review是全球顶尖的科技期刊之一
  - AI内容深度较高，包含研究进展和行业分析
  - 页面结构稳定，适合自动化抓取
