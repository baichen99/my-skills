id: techcrunch-ai
name: TechCrunch AI新闻
description: TechCrunch的AI相关新闻内容

access:
  url: https://techcrunch.com/artificial-intelligence/
  needsBrowser: false

extraction:
  listSelector: '.post-block'

  fields:
    title:
      selector: '.post-block__title__link'
      type: text

    url:
      selector: '.post-block__title__link'
      type: attribute
      attribute: href

    description:
      selector: '.post-block__content'
      type: text

    publishedAt:
      selector: '.river-byline__time'
      type: text
      optional: true

    source:
      selector: '.river-byline__authors a'
      type: text
      optional: true

notes: |
  - TechCrunch是全球知名的科技新闻网站
  - AI相关内容分类清晰，每日更新
  - 页面结构稳定，适合自动化抓取
