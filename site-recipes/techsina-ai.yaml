id: techsina-ai
name: 新浪科技AI新闻
description: 新浪科技的AI相关新闻

access:
  url: https://tech.sina.com.cn/ai/
  needsBrowser: true

  waitFor:
    selector: '.tech-list-item'
    timeout: 10000

extraction:
  listSelector: '.tech-list-item'

  fields:
    title:
      selector: '.tech-list-item-title'
      type: text

    url:
      selector: '.tech-list-item-title'
      type: attribute
      attribute: href

    description:
      selector: '.tech-list-item-summary'
      type: text

    publishedAt:
      selector: '.tech-list-item-time'
      type: text
      optional: true

    source:
      selector: '.tech-list-item-source'
      type: text
      optional: true

notes: |
  - 新浪科技是中国主流科技媒体之一
  - AI新闻覆盖范围广泛，包括产业动态和产品发布
  - 页面结构稳定，但需要浏览器渲染
