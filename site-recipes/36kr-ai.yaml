id: 36kr-ai
name: 36氪AI新闻
description: 36氪的AI相关新闻和创业项目

access:
  url: https://36kr.com/newsflashes/ai
  needsBrowser: true

  waitFor:
    selector: '.article-item'
    timeout: 10000

extraction:
  listSelector: '.article-item'

  fields:
    title:
      selector: '.article-item-title'
      type: text

    url:
      selector: '.article-item-title'
      type: attribute
      attribute: href

    description:
      selector: '.article-item-summary'
      type: text

    publishedAt:
      selector: '.article-item-time'
      type: text
      optional: true

    source:
      selector: '.article-item-source'
      type: text
      optional: true

notes: |
  - 36氪是中国知名的科技创业新闻平台
  - AI新闻覆盖范围广，包括创业项目和行业动态
  - 需要浏览器渲染，页面内容动态加载
